<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Propose for You</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: #f7cbd5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            overflow: hidden;
            touch-action: manipulation; /* 모바일 더블탭 방지 */
        }
        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            text-align: center;
            pointer-events: none;
        }
        .btn-container {
            position: relative;
            display: flex;
            gap: 30px;
            z-index: 10;
        }
        button {
            padding: 15px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background-color: #fff9f9;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
        }
        #no-btn {
            position: relative;
            transition: left 0.15s ease-out, top 0.15s ease-out;
            z-index: 100;
        }
        #result-img {
            display: none;
            max-width: 90%;
            max-height: 70vh;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1 id="question">나랑 같이 살래?</h1>

    <div id="ui-container" class="btn-container">
        <button id="yes-btn" onclick="showImage()">예</button>
        <button id="no-btn" onmouseover="runAway()" ontouchstart="runAway(event)">아니오</button>
    </div>

    <img id="result-img" src="./static/result.jpg" alt="결과 사진">

    <script>
        function runAway(event) {
            // 모바일에서 터치 시 스크롤 등 기본 동작 방지
            if (event && event.type === 'touchstart') {
                event.preventDefault();
            }

            const noBtn = document.getElementById('no-btn');
            if (noBtn.style.position !== 'absolute') {
                noBtn.style.position = 'absolute';
            }

            const padding = 40;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const newX = Math.random() * (maxX - padding) + padding;
            const newY = Math.random() * (maxY - padding) + padding;

            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
        }

        function showImage() {
            document.getElementById('question').style.display = 'none';
            document.getElementById('ui-container').style.display = 'none';
            const img = document.getElementById('result-img');
            img.style.display = 'block';
        }
    </script>
</body>
</html>
