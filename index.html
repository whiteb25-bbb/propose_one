<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Propose for You</title>
    <style>
        /* 화면 전체 고정 및 스크롤 완전 차단 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f7cbd5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            position: fixed; 
            touch-action: none; /* 모바일에서 화면 밀림 방지 */
        }

        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            pointer-events: none;
            text-align: center;
        }

        .btn-container {
            position: relative;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        button {
            padding: 15px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background-color: #fff9f9;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }

        /* 아니오 버튼: 도망가는 애니메이션 */
        #no-btn {
            z-index: 100;
            transition: left 0.15s ease-out, top 0.15s ease-out;
            /* 초기 위치를 브라우저가 자동으로 잡도록 함 */
        }

        #result-img {
            display: none;
            max-width: 90%;
            max-height: 70vh;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            object-fit: contain;
        }
    </style>
</head>
<body>

    <h1 id="question">나랑 같이 살래?</h1>

    <div id="ui-container" class="btn-container">
        <button id="yes-btn" onclick="showImage()">예</button>
        <button id="no-btn" onmouseover="runAway(event)" ontouchstart="runAway(event)">아니오</button>
    </div>

    <img id="result-img" src="/static/result.jpg" alt="결과 사진">

    <script>
        function runAway(e) {
            // 모바일 터치 시 화면 스크롤이나 클릭 이벤트를 완전히 무시
            if (e) {
                if (e.cancelable) e.preventDefault();
            }

            const btn = document.getElementById('no-btn');
            
            // 1. 처음 도망갈 때만 위치 모드를 고정(fixed)으로 변경
            if (btn.style.position !== 'fixed') {
                const rect = btn.getBoundingClientRect();
                btn.style.left = rect.left + 'px';
                btn.style.top = rect.top + 'px';
                btn.style.position = 'fixed';
                btn.style.margin = '0'; // 기존 flex 여백 제거
            }

            // 2. 현재 브라우저의 가시 영역(Viewport) 크기 측정
            // 주소창 등을 제외한 실제 보이는 영역만 계산합니다.
            const vWidth = window.innerWidth;
            const vHeight = window.innerHeight;

            // 3. 버튼의 현재 크기 확인
            const bWidth = btn.offsetWidth;
            const bHeight = btn.offsetHeight;

            // 4. 안전 영역 설정 (화면 끝에서 30px 안쪽으로만!)
            const safeMargin = 30;
            const maxX = vWidth - bWidth - safeMargin;
            const maxY = vHeight - bHeight - safeMargin;
            const minX = safeMargin;
            const minY = safeMargin;

            // 5. 랜덤 좌표 생성 (범위를 벗어나지 않도록 Math.max/min 사용)
            let newX = Math.random() * (maxX - minX) + minX;
            let newY = Math.random() * (maxY - minY) + minY;

            // 혹시라도 계산 오류로 음수가 나오지 않게 방어
            newX = Math.max(minX, Math.min(newX, maxX));
            newY = Math.max(minY, Math.min(newY, maxY));

            // 6. 좌표 즉시 적용
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
        }

        function showImage() {
            document.getElementById('question').style.display = 'none';
            document.getElementById('ui-container').style.display = 'none';
            const img = document.getElementById('result-img');
            img.style.display = 'block';
        }

        // 브라우저 크기가 변할 때(회전 등) 버튼이 갇히지 않게 초기화
        window.addEventListener('resize', () => {
            const btn = document.getElementById('no-btn');
            if (btn.style.position === 'fixed') {
                btn.style.position = 'relative';
                btn.style.left = 'auto';
                btn.style.top = 'auto';
            }
        });
    </script>
</body>
</html>
